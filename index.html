<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tecnicolor</title>
<style>
:root {
  --bg:#141414; --surface:#1e1e1e; --surface2:#262626; --border:#383838;
  --accent:#9b6dff; --accent2:#c4a8ff; --text:#f0f0f0; --text2:#888896;
  --success:#4caf7d; --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* ── Splash ─────────────────────────────────────────────── */
#splash{position:fixed;inset:0;z-index:1000;background:#141414;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;cursor:pointer;opacity:1;transition:opacity .7s ease}
#splash.fade-out{opacity:0;pointer-events:none}
.sp-logo{height:72px;width:auto;margin-bottom:44px;opacity:0;transition:opacity .9s ease .1s}
#splash.ready .sp-logo{opacity:1}
.sp-q{max-width:560px;text-align:center;font-size:clamp(20px,3.5vw,30px);font-weight:300;line-height:1.6;color:var(--text);font-style:italic;opacity:0;transform:translateY(16px);transition:opacity .9s ease .2s,transform .9s ease .2s}
#splash.ready .sp-q{opacity:1;transform:translateY(0)}
.sp-a{margin-top:28px;font-size:12px;font-weight:500;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;opacity:0;transition:opacity .9s ease .6s}
#splash.ready .sp-a{opacity:1}
.sp-hint{position:absolute;bottom:32px;font-size:11px;color:var(--text2);opacity:0;transition:opacity .6s ease 1.2s}
#splash.ready .sp-hint{opacity:.35}

/* ── Header ─────────────────────────────────────────────── */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-logo{display:flex;align-items:center;gap:10px}
.app-logo-img{height:36px;width:auto}
.app-logo-sub{font-size:10px;color:var(--text2);margin-top:1px}
.nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.nav-btn:hover{background:var(--border);color:var(--text)}

/* ── Screens ────────────────────────────────────────────── */
.screen{max-width:680px;margin:0 auto;padding:24px 16px 100px}

/* ── Selector ───────────────────────────────────────────── */
.search-wrap{position:relative;margin-bottom:24px}
.search-box{display:flex;align-items:center;gap:12px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;transition:border-color .2s}
.search-box:focus-within{border-color:var(--accent)}
.search-icon{font-size:18px;flex-shrink:0;opacity:.5}
.search-box input{flex:1;background:none;border:none;outline:none;font-size:15px;color:var(--text);font-family:inherit}
.search-box input::placeholder{color:var(--text2)}
.search-clear{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:0 4px}
.search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.search-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .1s}
.search-item:hover{background:var(--surface2)}
.search-item+.search-item{border-top:1px solid var(--border)}
.search-item-icon{font-size:20px;flex-shrink:0}
.search-item-name{font-size:14px;font-weight:500;color:var(--text)}
.search-item-cat{font-size:11px;color:var(--text2);margin-top:2px}
.search-empty{padding:16px;text-align:center;color:var(--text2);font-size:13px}
.selector-hint{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin-bottom:12px}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.cat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 14px;cursor:pointer;text-align:left;transition:all .15s}
.cat-card:hover:not(.disabled){border-color:var(--accent);background:rgba(155,109,255,.08)}
.cat-card.disabled{opacity:.4;cursor:default}
.cat-icon{font-size:24px;display:block;margin-bottom:8px}
.cat-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.cat-desc{font-size:11px;color:var(--text2);line-height:1.4}
.tech-cat-header{display:flex;align-items:center;gap:10px;padding:12px 0 16px;font-size:16px;font-weight:600}
.tech-list{display:flex;flex-direction:column;gap:8px}
.tech-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:14px 16px;border-radius:8px;cursor:pointer;text-align:left;font-size:14px;font-weight:500;transition:all .15s}
.tech-btn:hover{border-color:var(--accent);background:rgba(155,109,255,.08);color:var(--accent2)}
.back-cat-btn{background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;padding:0 0 16px;display:flex;align-items:center;gap:6px}
.back-cat-btn:hover{color:var(--text)}

/* ── Form tech header ───────────────────────────────────── */
.form-tech-header{display:flex;align-items:center;gap:14px;padding:20px 0 4px;margin-bottom:12px}
.form-tech-icon{font-size:32px}
.form-tech-cat{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:3px}
.form-tech-name{font-size:20px;font-weight:700;color:var(--text)}

/* ── Sections ───────────────────────────────────────────── */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.section-header{padding:12px 18px;display:flex;align-items:center;gap:10px;background:var(--surface2);border-bottom:1px solid var(--border)}
.section-num{background:var(--accent);color:white;font-size:10px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.section-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
.section-body{padding:16px 18px}

/* ── Grids ──────────────────────────────────────────────── */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:7px}

/* ── Opt buttons ────────────────────────────────────────── */
.opt{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;text-align:left;transition:all .15s;line-height:1.4;width:100%}
.opt:hover{border-color:var(--accent2);background:rgba(155,109,255,.08)}
.opt.sel{border-color:var(--accent);background:rgba(155,109,255,.18);color:var(--accent2)}
.opt .o-icon{font-size:17px;display:block;margin-bottom:4px}
.opt .o-label{font-size:13px;font-weight:600;display:block}
.opt .o-sub{font-size:11px;color:var(--text2);margin-top:2px;display:block}
.opt.sel .o-sub{color:rgba(196,168,255,.6)}

/* ── Tags ───────────────────────────────────────────────── */
.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;user-select:none}
.tag:hover{border-color:var(--accent2);color:var(--text)}
.tag.sel{border-color:var(--accent);background:rgba(155,109,255,.18);color:var(--accent2)}
.nivel{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);padding:5px 9px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;font-family:monospace;transition:all .15s;user-select:none}
.nivel:hover{border-color:var(--accent2);color:var(--text)}
.nivel.sel{border-color:var(--accent);background:rgba(155,109,255,.2);color:var(--accent2)}

/* ── Inputs ─────────────────────────────────────────────── */
input[type="text"],input[type="number"]{background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;font-family:inherit;width:100%;transition:border-color .15s}
input:focus{outline:none;border-color:var(--accent)}
input::placeholder{color:var(--text2)}
textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;min-height:76px;transition:border-color .15s}
textarea:focus{outline:none;border-color:var(--accent)}
textarea::placeholder{color:var(--text2)}
.macro-area{min-height:130px;border-color:rgba(155,109,255,.3)!important;line-height:1.65}
.macro-hint{font-size:11px;color:var(--text2);margin-top:6px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.btn-regen{background:rgba(155,109,255,.15);border:1px solid rgba(155,109,255,.4);color:var(--accent2);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;transition:all .15s}
.btn-regen:hover{background:rgba(155,109,255,.25)}

/* ── Toggle ─────────────────────────────────────────────── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0}
.toggle-label{font-size:13px}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:22px;cursor:pointer;transition:.2s}
.toggle-slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}

/* ── Sub-sections ───────────────────────────────────────── */
.sub{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.sub-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.sub-label-opt{font-weight:400;text-transform:none;letter-spacing:0}
.row{display:flex;gap:10px;align-items:flex-start}
.field{flex:1}
.field-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.div{height:1px;background:var(--border);margin:12px 0}
.mt1{margin-top:6px}.mt2{margin-top:10px}.mt3{margin-top:14px}

/* ── Spine diagram ──────────────────────────────────────── */
.spine-wrap{background:var(--surface2);border-radius:10px;padding:14px 10px;margin-top:4px;overflow-x:auto}
.spine-region-hdr{text-align:center;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);padding:8px 0 4px;margin-top:4px}
.spine-region-hdr:first-child{margin-top:0}
.spine-col-hdr{display:grid;grid-template-columns:1fr 90px 1fr;gap:4px;align-items:center;margin-bottom:6px}
.spine-col-hdr span{font-size:10px;color:var(--text2);text-align:center;font-weight:500}
.spine-col-hdr .col-l{text-align:right}
.spine-col-hdr .col-r{text-align:left}
.spine-row{display:grid;grid-template-columns:1fr 90px 1fr;gap:4px;align-items:center;margin-bottom:3px;position:relative}
.spine-row::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--border);transform:translateX(-50%);z-index:0;pointer-events:none}
.spine-center{position:relative;z-index:1;text-align:center;cursor:pointer;padding:3px 0}
.spine-center:hover .vert-lb{color:var(--accent2)}
.vert-lb{font-size:11px;font-weight:700;font-family:monospace;color:var(--text2);display:block;background:var(--surface);padding:3px 6px;border-radius:4px;border:1px solid var(--border);transition:all .15s}
.vert-nt{font-size:9px;color:var(--text2);display:block;margin-top:1px;letter-spacing:.03em}
.spine-side{display:flex;justify-content:flex-end;z-index:1;position:relative}
.spine-side.r{justify-content:flex-start}
.bdot{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:monospace;color:var(--text2);transition:all .15s;user-select:none;flex-shrink:0}
.bdot:hover{border-color:var(--accent2);color:var(--text)}
.bdot.sel{background:var(--accent);border-color:var(--accent);color:white;box-shadow:0 0 8px rgba(155,109,255,.5)}
.bdot.sel-light{background:rgba(155,109,255,.2);border-color:var(--accent)}
.spine-legend{display:flex;gap:16px;justify-content:center;margin-top:10px;font-size:11px;color:var(--text2)}
.spine-legend span{display:flex;align-items:center;gap:5px}
.legend-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--surface);display:inline-block}
.legend-dot.sel{background:var(--accent);border-color:var(--accent)}

/* ── Generate btn ───────────────────────────────────────── */
.btn-generate{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:white;border:none;padding:14px 36px;border-radius:30px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.05em;box-shadow:0 4px 24px rgba(155,109,255,.5);transition:all .2s;z-index:50;white-space:nowrap}
.btn-generate:hover{background:#8559e8;box-shadow:0 6px 28px rgba(155,109,255,.7);transform:translateX(-50%) translateY(-2px)}

/* ── Modal ──────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:680px;max-height:92vh;display:flex;flex-direction:column}
.modal-head{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:700}
.modal-body{flex:1;overflow-y:auto;padding:20px}
.report-textarea{width:100%;background:#111;border:1px solid var(--border);border-radius:8px;padding:16px;font-family:'Courier New',monospace;font-size:13px;line-height:1.75;color:var(--text);resize:vertical;min-height:320px}
.report-textarea:focus{outline:none;border-color:var(--accent)}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
.modal-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);transition:all .15s}
.modal-btn-pri{background:var(--accent);border-color:var(--accent);color:white}
.modal-btn-sec{background:var(--surface2);color:var(--text)}
.modal-btn-pri:hover{background:#8559e8}
.modal-btn-sec:hover{background:var(--border)}

/* ── Toast ──────────────────────────────────────────────── */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--success);color:white;padding:8px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.on{opacity:1}
.hidden{display:none!important}

@media(max-width:480px){
  .grid-auto{grid-template-columns:repeat(2,1fr)}
  .row{flex-direction:column}
  .cat-grid{grid-template-columns:repeat(2,1fr)}
  .spine-row{grid-template-columns:1fr 76px 1fr}
  .spine-col-hdr{grid-template-columns:1fr 76px 1fr}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" onclick="dismissSplash()">
  <img src="logo.png" alt="Tecnicolor" class="sp-logo">
  <div class="sp-q" id="sq"></div>
  <div class="sp-a" id="sa"></div>
  <div class="sp-hint">toca para continuar</div>
</div>

<!-- HEADER -->
<header class="app-header hidden" id="app-header">
  <div class="app-logo">
    <img src="logo.png" alt="Tecnicolor" class="app-logo-img">
    <div class="app-logo-sub" style="margin-top:0">Registro intervencionista del dolor</div>
  </div>
  <button class="nav-btn hidden" id="btn-back" onclick="goBack()">← Volver</button>
</header>

<!-- SELECTOR -->
<div class="screen hidden" id="screen-selector">
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="¿Qué técnica? Escribe aunque sea con faltas..." oninput="onSearch(this.value)" autocomplete="off">
      <button class="search-clear hidden" id="search-clear" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-results hidden" id="search-results"></div>
  </div>
  <div id="cat-view">
    <div class="selector-hint">o elige por categoría</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>
  <div class="hidden" id="tech-view">
    <button class="back-cat-btn" onclick="showAllCats()">← Todas las categorías</button>
    <div class="tech-cat-header">
      <span id="tech-cat-icon"></span>
      <span id="tech-cat-name"></span>
    </div>
    <div class="tech-list" id="tech-list"></div>
  </div>
</div>

<!-- FORM -->
<div class="screen hidden" id="screen-form">
  <div id="form-container"></div>
</div>

<button class="btn-generate hidden" id="btn-gen" onclick="generarInforme()">GENERAR INFORME →</button>

<!-- REPORT MODAL -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">📄 Informe — editable</span>
      <button class="nav-btn" onclick="closeModal()">✕ Cerrar</button>
    </div>
    <div class="modal-body">
      <textarea class="report-textarea" id="report-out" spellcheck="false"></textarea>
    </div>
    <div class="modal-foot">
      <button class="modal-btn modal-btn-sec" onclick="closeModal()">← Editar</button>
      <button class="modal-btn modal-btn-pri" onclick="copyReport()">📋 Copiar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ Copiado al portapapeles</div>

<script>
// ════════════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════════════

const QUOTES = [

const CATEGORIES = [
  {id:'epidural',    name:'Epidural',        icon:'💉', desc:'Interlaminar · Transforaminal · Caudal · Parasagital'},
  {id:'facetas',     name:'Facetas',          icon:'⚡', desc:'Bloqueo · Radiofrecuencia — Cervical · Torácico · Lumbar'},

  {id:'sacroiliaca', name:'Sacroilíaca',      icon:'🔴', desc:'Bloqueo · Radiofrecuencia'},
  {id:'estimuladores',name:'Estimuladores',   icon:'🔋', desc:'Próximamente',disabled:true},
  {id:'simpatico',   name:'Simpático',        icon:'🌡️', desc:'Próximamente',disabled:true},
  {id:'infusiones',  name:'Infusiones',       icon:'💧', desc:'Próximamente',disabled:true},
  {id:'bomba',       name:'Relleno de bomba', icon:'🔄', desc:'Próximamente',disabled:true},
];

const TECHNIQUES = [
  {id:'epi-interlaminar',        name:'Epidural interlaminar',           cat:'epidural',    aliases:['epidural interlaminar','interlaminar','epidrual','epirdual']},
  {id:'epi-transforaminal',      name:'Epidural transforaminal',         cat:'epidural',    aliases:['transforaminal','tf','foraminal','tranforaminal']},

function norm(s){return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,'')}
function lev(a,b){
  if(!a.length)return b.length;if(!b.length)return a.length;
  const dp=Array.from({length:a.length+1},(_,i)=>[i]);
  for(let j=1;j<=b.length;j++)dp[0][j]=j;
  for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[a.length][b.length];
}
function scoreMatch(query,t){
  const q=norm(query);
  const corpus=norm([t.name,...t.aliases].join(' '));
  let score=0;
  if(corpus.includes(q))score+=100;
  q.split(/\s+/).filter(w=>w.length>=2).forEach(word=>{
    if(corpus.includes(word)){score+=50;return;}
    corpus.split(/\s+/).forEach(cw=>{
      if(cw.length<2)return;
      const d=lev(word,cw);
      if(d===0)score+=60;else if(d===1)score+=35;else if(d===2&&word.length>=4)score+=15;
    });
  });
  return score;
}
function onSearch(query){
  const clear=document.getElementById('search-clear');
  const res=document.getElementById('search-results');
  clear.classList.toggle('hidden',!query);
  if(!query||query.trim().length<2){res.classList.add('hidden');return;}
  const matches=TECHNIQUES.map(t=>({...t,score:scoreMatch(query,t)})).filter(t=>t.score>0).sort((a,b)=>b.score-a.score).slice(0,6);
  if(!matches.length){res.innerHTML='<div class="search-empty">Sin resultados — prueba otra descripción</div>';}
  else{res.innerHTML=matches.map(t=>{const cat=CATEGORIES.find(c=>c.id===t.cat);return`<div class="search-item" onclick="selectTechnique('${t.id}')"><span class="search-item-icon">${cat?.icon||'·'}</span><div><div class="search-item-name">${t.name}</div><div class="search-item-cat">${cat?.name||t.cat}</div></div></div>`;}).join('');}
  res.classList.remove('hidden');
}

function natUbi(){return S.ubicacion?(S.ubicacion==='qx'?'en quirófano ':'en sala de técnicas '):''}
function natOpeningLine(){
  const pos = S.posicion || 'posición adecuada';
  const lugar = S.ubicacion ? (S.ubicacion==='qx'?'quirófano':'sala de técnicas') : 'sala';
  return `Paciente en ${pos}, en ${lugar}, bajo medidas de asepsia tras limpieza de zona a intervenir.`;
}
function natLat(prep){
  if(!S.lat)return '';
  const m={D:'en el lado derecho',I:'en el lado izquierdo',B:'bilateral'};
  return (prep?prep+' ':'')+m[S.lat];
}
function natNiveles(){
  if(!S.niveles.length)return '';
  const n=S.niveles;
  if(n.length===1)return `a nivel ${n[0]}`;
  return `a niveles ${n.slice(0,-1).join(', ')} y ${n[n.length-1]}`;
}
function natBranches(){
  if(!S.branches.size)return '';
  const groups={};
  for(const b of S.branches){const[lvl,side]=b.split('-');if(!groups[lvl])groups[lvl]=new Set();groups[lvl].add(side);}
  const sorted=SPINE_ORDER.filter(l=>groups[l]);
  const desc=sorted.map(lvl=>{
    const s=groups[lvl],lbl=BRANCH_LBL[lvl]||lvl;
    if(s.has('L')&&s.has('R'))return`${lbl} bilateral`;
    if(s.has('R'))return`${lbl} derecho`;
    return`${lbl} izquierdo`;
  });
  if(!desc.length)return '';
  if(desc.length===1)return desc[0];
  return desc.slice(0,-1).join(', ')+' y '+desc[desc.length-1];
}
function natElectrodo(){
  const parts=[];
  if(S.rfLong)parts.push(`de ${S.rfLong} mm`);
  if(S.rfTip)parts.push(`punta activa de ${S.rfTip} mm`);
  return parts.length?'electrodos '+parts.join(', con '):'los electrodos de radiofrecuencia';
}
function natRFParams(){
  const p1=gv('rf-p1'),t=gv('rf-tiempo');
  const parts=[];
  if(S.rfTipo==='Pulsada'){if(p1)parts.push(`a ${p1} V`);}else{if(p1)parts.push(`a ${p1} °C`);}
  if(t)parts.push(`durante ${t} s por punto`);
  return parts.length?parts.join(', '):'';
}
function natTests(){
  const s=gv('rf-sens'),m=gv('rf-motor');
  const parts=[];
  if(s)parts.push(`test sensitivo a ${s}`);
  if(m)parts.push(`test motor a ${m} sin contracción muscular indeseada`);
  return parts.length?'Se realizan '+parts.join(' y ')+'. ':'';
}
function natAL(){
  const names=[...S.alList];const c=gv('al-custom');if(c)names.push(c);const v=gv('al-vol');
  if(!names.length&&!v)return'';
  return names.join(' + ')+(v?` (${v})`:'');
}
function natMezcla(){
  const al=natAL(),cort=S.cort&&S.cort!=='—'?S.cort:'';
  const parts=[al,cort].filter(Boolean);
  return parts.length?parts.join(' con '):'';
}
function natImagen(){
  const map={fluoroscopia:'control radioscópico',ecografia:'guía ecográfica'};
  const parts=(S.imagen||[]).map(x=>map[x]).filter(Boolean);
  if(!parts.length)return'control de imagen';
  return parts.length===1?parts[0]:parts.join(' y ');
}
function natATB(){
  if(!gc('chk-atb'))return'';
  const atb=[...gsel('[data-a="atb1"]')];const ao=gv('atb-otro');if(ao)atb.push(ao);
  if(!atb.length)return'Se administra profilaxis antibiótica. ';
  return`Se administra profilaxis antibiótica con ${atb.join(' y ')}. `;
}
function natResultado(){
  if(!S.resultado)return'';
  const eva=S.eva!=null?` EVA post-procedimiento inmediato: ${S.eva}/10.`:'';
  const comp=gv('comp-txt');
  switch(S.resultado){
    case 'sin-incidencias': return`Procedimiento realizado sin incidencias.${eva}`;
    case 'dolor-intra': return`Durante el procedimiento el paciente refirió dolor con tolerancia parcial${comp?`: ${comp}`:''}. Se adoptaron las medidas oportunas.${eva}`;
    case 'comp-menor': return`Incidencia menor durante el procedimiento${comp?`: ${comp}`:''}. Resuelta en sala sin complicaciones adicionales.${eva}`;
    case 'comp-mayor': return`Complicación mayor durante el procedimiento${comp?`: ${comp}`:''}. Requirió intervención adicional.${eva}`;
    default:return'';
  }
}

function genMacro(id){
  const lat=natLat(), niv=natNiveles(), br=natBranches();
  const electrodo=natElectrodo(), rfparams=natRFParams(), tests=natTests();
  const mezcla=natMezcla();
  const opening=natOpeningLine();
  const atb=natATB();
  const img=natImagen();
  const contr=gc('chk-contraste')?' con contraste radiológico':'';

  const latNiv=[lat,niv].filter(Boolean).join(', ');
  const latBr=[lat,br].filter(Boolean);
  const latBrDesc=latBr.length?latBr.join(', '):'';

  switch(id){
    case 'epi-interlaminar':{
      let t=`${opening} ${atb}Se realiza infiltración epidural interlaminar`;
      if(niv)t+=` ${niv}`;
      t+=` bajo ${img}. Bajo anestesia local, se introduce aguja de Tuohy hasta el espacio epidural mediante técnica de pérdida de resistencia. Se confirma posición epidural${contr}. Se administra`;
      t+=mezcla?` ${mezcla}`:' la mezcla terapéutica';
      t+='. Procedimiento sin incidencias.';
      return t;
    }
    case 'epi-parasagital':{
      let t=`${opening} ${atb}Se realiza infiltración epidural parasagital`;
      if(latNiv)t+=` ${latNiv}`;
      t+=` bajo ${img}. Con proyección parasagital y angulación lateral se introduce la aguja en el espacio epidural mediante pérdida de resistencia. Se confirma posición epidural${contr}. Se administra`;
      t+=mezcla?` ${mezcla}`:' la mezcla terapéutica';
      t+='. Procedimiento sin incidencias.';
      return t;
    }
    case 'epi-caudal':{
      let t=`${opening} ${atb}Se realiza infiltración epidural caudal bajo ${img}. Localización del hiato sacro y confirmación radioscópica. Bajo anestesia local, se introduce aguja hasta el canal sacro. Se confirma posición intracanalicular${contr} sin distribución vascular ni subaracnoidea. Se administra`;
      t+=mezcla?` ${mezcla}`:' la mezcla terapéutica';
      t+='. Procedimiento sin incidencias.';
      return t;
    }
    case 'epi-transforaminal':{
      let t=`${opening} ${atb}Se realiza infiltración transforaminal`;
      if(latNiv)t+=` ${latNiv}`;
      t+=` bajo ${img}. Con proyección oblicua se visualiza el foramen neural diana. Bajo anestesia local, se avanza aguja hasta el cuadrante posterosuperior del foramen. Se confirma posición periradicular${contr} sin distribución vascular. Se administra`;
      t+=mezcla?` ${mezcla}`:' la mezcla terapéutica';
      t+='. Procedimiento sin incidencias.';
      return t;

      t+=` ${bm}`;
      const bv=gv('blq-vol');if(bv)t+=` (${bv} por punto)`;
      t+='. Procedimiento sin incidencias.';
      return t;
    }
    case 'facetas-rf-cerv':case 'facetas-rf-tor':case 'facetas-rf-lumb':{
      const reg={cerv:'cervicales',tor:'torácicos',lumb:'lumbares'}[id.split('-')[2]];
      const modal=S.rfTipo?S.rfTipo.toLowerCase():'';
      let t=`${opening} ${atb}Se realiza radiofrecuencia${modal?' '+modal:''} de ramos mediales ${reg} bajo ${img}`;

      if(rfparams)t+=`Se realiza la lesión ${rfparams}. `;

      return t;

      const ui=gv('botox-ui'),vol=gv('botox-vol'),punc=gv('botox-punc');

      if(punc)details.push(`${punc} punciones`);
      if(veh)details.push(`vehículo: ${veh.toLowerCase()}`);

    }

      return `${opening} ${atb}Se realiza infiltración intraarticular de hombro${lat?`, ${lat}`:''}  bajo ${img}. Se accede al espacio glenohumeral y se confirma posición intraarticular.${S.sust?` Se administra ${S.sust}.`:' Se administra la sustancia terapéutica.'} Procedimiento sin incidencias.`;

      return `${opening} ${atb}Se realiza infiltración periarticular de hombro${lat?`, ${lat}`:''}  bajo ${img}. Se localiza el espacio subdeltoideo/subacromial. Se confirma posición y se administra${S.sust?` ${S.sust}`:' la sustancia terapéutica'}. Procedimiento sin incidencias.`;

      return `${opening} ${atb}Se realiza radiofrecuencia de ramas capsulares del hombro${lat?`, ${lat}`:''}  bajo ${img}. Se localizan las ramas y se posiciona ${electrodo}. ${tests}${rfparams?`Se realiza la lesión ${rfparams}. `:''}Procedimiento sin incidencias.`;
    case 'rodilla-intraarticular':
      return `${opening} ${atb}Se realiza infiltración intraarticular de rodilla${lat?`, ${lat}`:''}  bajo ${img}. Se accede al espacio articular confirmando posición. Se administra${S.sust?` ${S.sust}`:' la sustancia terapéutica'}. Procedimiento sin incidencias.`;
    case 'rodilla-perirodilla':
      return `${opening} ${atb}Se realiza infiltración periarticular de rodilla${lat?`, ${lat}`:''}  bajo ${img}. Se identifican las estructuras periarticulares diana y se realizan las infiltraciones según pauta. Procedimiento sin incidencias.`;
    case 'sacroiliaca-bloqueo':
      return `${opening} ${atb}Se realiza infiltración de la articulación sacroilíaca${lat?`, ${lat}`:''}  bajo ${img}. Se localiza la interlínea articular en su tercio inferior. Se accede al espacio articular confirmando posición${contr}. Se administra${S.sust?` ${S.sust}`:' la mezcla terapéutica'}. Procedimiento sin incidencias.`;
    case 'sacroiliaca-rf':
      return `${opening} ${atb}Se realiza radiofrecuencia${S.rfTipo?' '+S.rfTipo.toLowerCase():''} de la articulación sacroilíaca${lat?`, ${lat}`:''}  bajo ${img}. Se posiciona ${electrodo} cubriendo los ramos dorsales S1-S3. ${tests}${rfparams?`Se realiza la lesión ${rfparams}. `:''}Procedimiento sin incidencias.`;
    default:return opening;
  }
}
function regenMacro(){
  const mt=document.getElementById('macro-txt');
  if(mt)mt.value=genMacro(TECH_ID);
}

// SPINE DIAGRAM BUILDER
// ════════════════════════════════════════════════════════════
function buildSpineDiagram(){
  const regions=[
    {r:'C',label:'Cervical'},
    {r:'T',label:'Torácico'},
    {r:'L',label:'Lumbar'},
  ];
  let html=`<div class="spine-wrap">`;
  html+=`<div class="spine-col-hdr"><span class="col-l">← Izquierda</span><span></span><span class="col-r">Derecha →</span></div>`;
  regions.forEach(reg=>{
    const levels=SPINE.filter(s=>s.r===reg.r);
    html+=`<div class="spine-region-hdr">${reg.label}</div>`;
    levels.forEach(s=>{
      const cL=S.branches.has(s.id+'-L')?'sel':'';
      const cR=S.branches.has(s.id+'-R')?'sel':'';
      const vertContent=s.showVert?`<span class="vert-lb">${s.lb||'·'}</span>`:`<span class="vert-lb" style="opacity:.3">·</span>`;
      const noteHtml=s.nt?`<span class="vert-nt">${s.nt}</span>`:'';
      html+=`<div class="spine-row">
        <div class="spine-side"><button class="bdot ${cL}" data-branch="${s.id}-L" title="${BRANCH_LBL[s.id]||s.id} — izquierdo"></button></div>
        <div class="spine-center" onclick="toggleBothBranches('${s.id}')" title="Clic: bilateral">${vertContent}${noteHtml}</div>
        <div class="spine-side r"><button class="bdot ${cR}" data-branch="${s.id}-R" title="${BRANCH_LBL[s.id]||s.id} — derecho"></button></div>
      </div>`;
    });
  });
  html+=`<div class="spine-legend"><span><span class="legend-dot"></span>No tratado</span><span><span class="legend-dot sel"></span>Tratado</span><span style="color:var(--text2);font-size:10px">Clic en etiqueta → bilateral</span></div>`;
  html+=`</div>`;
  return html;
}

function toggleBothBranches(lvl){
  const kL=lvl+'-L', kR=lvl+'-R';
  const bothSel=S.branches.has(kL)&&S.branches.has(kR);
  if(bothSel){S.branches.delete(kL);S.branches.delete(kR);}
  else{S.branches.add(kL);S.branches.add(kR);}
  refreshSpineDots();
  regenMacro();
}

function toggleBranch(key){
  if(S.branches.has(key))S.branches.delete(key);
  else S.branches.add(key);
  refreshSpineDots();
  regenMacro();
}

function refreshSpineDots(){
  document.querySelectorAll('.bdot').forEach(dot=>{
    const k=dot.dataset.branch;
    dot.classList.toggle('sel',S.branches.has(k));
  });
}

function tog(id,on){document.getElementById(id)?.classList.toggle('hidden',!on)}

function initHandlers(){
  document.getElementById('form-container').addEventListener('click',e=>{
    // Branch dots
    const bdot=e.target.closest('.bdot');
    if(bdot){toggleBranch(bdot.dataset.branch);return;}

    const el=e.target.closest('[data-a]');
    if(!el)return;
    const a=el.dataset.a,v=el.dataset.v;

    if(a==='posicion'){
      S.posicion=v;
      el.closest('.tags').querySelectorAll('[data-a="posicion"]').forEach(b=>b.classList.remove('sel'));
      el.classList.add('sel');
      regenMacro();
    }
    else if(a==='ubicacion'){
      S.ubicacion=v;
      el.parentElement.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
      el.classList.add('sel');
      regenMacro();
    }
    else if(a==='lat'){
      S.lat=v;
      el.parentElement.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
      el.classList.add('sel');
      regenMacro();
    }
    else if(a==='nivel'){
      el.classList.toggle('sel');
      if(el.classList.contains('sel')){if(!S.niveles.includes(v))S.niveles.push(v);}
      else S.niveles=S.niveles.filter(n=>n!==v);
      regenMacro();
    }
    else if(a==='imagen'){
      el.classList.toggle('sel');
      if(el.classList.contains('sel')){if(!S.imagen.includes(v))S.imagen.push(v);}
      else S.imagen=S.imagen.filter(x=>x!==v);
      regenMacro();
    }
    else if(a==='al'){
      el.classList.toggle('sel');
      if(el.classList.contains('sel')){if(!S.alList.includes(v))S.alList.push(v);}
      else S.alList=S.alList.filter(x=>x!==v);
      regenMacro();
    }
    else if(a==='cort'){
      S.cort=v;
      document.querySelectorAll('[data-a="cort"]').forEach(b=>b.classList.remove('sel'));
      el.classList.add('sel');
      regenMacro();
    }
    else if(a==='rftype'){
      S.rfTipo=v;
      el.parentElement.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
      el.classList.add('sel');
      const lbl=document.getElementById('lbl-p1');
      if(lbl)lbl.textContent=v==='Pulsada'?'Voltaje (V)':'Temperatura (°C)';
      regenMacro();
    }
    else if(a==='rflong'){
      S.rfLong=v;
      el.parentElement.querySelectorAll('.nivel').forEach(b=>b.classList.remove('sel'));
      el.classList.add('sel');
      regenMacro();
    }
    else if(a==='rftip'){
      S.rfTip=v;
      el.parentElement.querySelectorAll('.nivel').forEach(b=>b.classList.remove('sel'));
      el.classList.add('sel');
      regenMacro();
    }
    else if(a==='resultado'){
      S.resultado=v;
      document.querySelectorAll('[data-a="resultado"]').forEach(b=>b.classList.remove('sel'));
      el.classList.add('sel');
      document.getElementById('blk-comp')?.classList.toggle('hidden',!v.includes('comp'));
    }
    else if(a==='eva'){
      S.eva=v;
      document.querySelectorAll('[data-a="eva"]').forEach(b=>b.classList.remove('sel'));
      el.classList.add('sel');
    }
    else if(a==='atb1'){
      el.closest('.tags').querySelectorAll('[data-a="atb1"]').forEach(t=>t.classList.remove('sel'));
      el.classList.add('sel');
    }
    else if(a==='tgtog'){el.classList.toggle('sel');}
    else if(a==='tg1-veh'){
      el.closest('.tags').querySelectorAll('[data-a="tg1-veh"]').forEach(t=>t.classList.remove('sel'));
      el.classList.add('sel');
      regenMacro();
    }
    else if(a==='sust'){
      S.sust=v;
      document.querySelectorAll('[data-a="sust"]').forEach(b=>b.classList.remove('sel'));
      el.classList.add('sel');
      document.getElementById('blk-sust-alcort')?.classList.toggle('hidden',!['AL + corticoide','Anestésico local'].includes(v));
      regenMacro();
    }
  });
}

// ════════════════════════════════════════════════════════════
// REPORT
// ════════════════════════════════════════════════════════════
const IMG_L={fluoroscopia:'fluoroscopia / Rx',ecografia:'ecografía',ninguna:'sin guía de imagen'};
const RES_L={'sin-incidencias':'Sin incidencias.','dolor-intra':'Dolor intraprocedimiento con tolerancia parcial.','comp-menor':'Complicación menor resuelta en sala.','comp-mayor':'Complicación mayor que requirió intervención.'};
const UBIC_L={qx:'quirófano',sala:'sala de técnicas'};
const LAT_L={D:'lado derecho',I:'lado izquierdo',B:'bilateral'};

const gv=id=>(document.getElementById(id)?.value||'').trim();
const gc=id=>document.getElementById(id)?.checked||false;
const gsel=sel=>Array.from(document.querySelectorAll(sel)).filter(e=>e.classList.contains('sel')).map(e=>e.textContent.trim());

function generarInforme(){
  const fecha=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
  const lines=[];const add=s=>lines.push(s);const br=()=>lines.push('');

  add(`Fecha: ${fecha}`);
  br();

  // Texto clínico directo
  const macro=gv('macro-txt');
  if(macro) add(macro);

  // Sedación (si aplica), integrada al final del bloque narrativo
  if(gc('chk-sed')){
    const sf=gsel('[data-a="tgtog"]'),so=gv('sed-obs');
    let sed='Se realizó sedación / analgesia procedimental';
    if(sf.length)sed+=` con ${sf.join(', ')}`;
    if(so)sed+=`. ${so}`;
    br();add(sed+'.');
  }

  // Resultado e incidencias en lenguaje natural
  const res=natResultado();
  if(res){br();add(res);}

  // Notas libres
  const obs=gv('obs-txt');
  if(obs){br();add(obs);}

  document.getElementById('report-out').value=lines.join('\n');
  document.getElementById('overlay').classList.remove('hidden');
}

function closeModal(){document.getElementById('overlay').classList.add('hidden');}
function copyReport(){
  navigator.clipboard.writeText(document.getElementById('report-out').value).then(()=>{
    const t=document.getElementById('toast');t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2000);
  });
}

initSplash();
